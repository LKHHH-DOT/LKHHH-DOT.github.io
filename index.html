<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="myself_web - 个人主站，展示项目与能力">
  <title>myself_web</title>
  <link rel="stylesheet" href="src/css/style.css">
  <link rel="icon" href="src/assets/images/favicon.ico" type="image/x-icon">
</head>
<body>
  <header class="navbar">
    <div class="container">
      <a href="/" class="logo">myself_web</a>
      <nav class="nav-links">
        <a href="/">首页</a>
        <a href="/projects">项目</a>
        <a href="/about">关于</a>
        <a href="/docs">文档</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="hero">
      <div class="container">
        <h1>欢迎来到 <span class="highlight">myself_web</span></h1>
        <p class="subtitle">个人主站 · 项目展示 · 技术分享</p>
        <div class="hero-actions">
          <a href="/projects" class="btn btn-primary">查看项目</a>
          <a href="/about" class="btn btn-secondary">关于我</a>
        </div>
      </div>
    </section>

    <section class="features">
      <div class="container">
        <h2>核心板块</h2>
        <div class="card-grid">
          <div class="card">
            <h3>📂 项目集</h3>
            <p>托管在 GitHub 上的各类项目，包含完整文档与部署链接。</p>
          </div>
          <div class="card">
            <h3>📖 技术文档</h3>
            <p>项目文档、部署指南、开发笔记汇总。</p>
          </div>
          <div class="card">
            <h3>🚀 一键部署</h3>
            <p>通过 GitHub Pages 自动化部署，持续集成。</p>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container">
      <p>&copy; 2026 myself_web. Built with ❤️</p>
    </div>
  </footer>

  <script src="src/js/main.js"></script>
</body>
</html>
