<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="小熙的HTML作品集导航 — 快速访问所有HTML项目页面。">

    <link rel="stylesheet" href="style.css">
    <style>
        /* ===== 作品集头部 ===== */
        .works-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 30px;
        }
        .works-header h1 { margin: 0; color: white; font-size: 2em; }
        .works-header p { opacity: 0.8; font-size: 14px; color: rgba(255,255,255,0.8); }

        /* ===== 统计卡片 ===== */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 14px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: var(--nav-bg);
            backdrop-filter: blur(12px);
            border-radius: 14px;
            padding: 18px 16px;
            text-align: center;
            box-shadow: var(--shadow-sm);
            border: 1px solid rgba(102,126,234,0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .stat-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 24px rgba(0,0,0,0.12);
        }
        .stat-icon { font-size: 24px; margin-bottom: 6px; }
        .stat-number { font-size: 26px; font-weight: 700; color: var(--accent); }
        .stat-label { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }

        /* ===== 抽屉式统计卡片 ===== */
        .stat-drawer {
            cursor: pointer;
            position: relative;
            z-index: 1;
        }
        .stat-drawer .drawer-front {
            transition: all 0.3s ease;
        }
        .stat-drawer .drawer-body {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease, padding 0.4s ease, opacity 0.3s ease;
            opacity: 0;
            padding: 0 4px;
        }
        .stat-drawer:hover .drawer-body {
            max-height: 200px;
            opacity: 1;
            padding: 10px 4px 4px;
        }
        .stat-drawer:hover .drawer-front .stat-number {
            font-size: 20px;
            transition: font-size 0.3s ease;
        }
        .drawer-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 5px 8px;
            border-radius: 6px;
            font-size: 12px;
            color: var(--text-secondary);
            transition: background 0.2s;
        }
        .drawer-item:hover {
            background: var(--hover-bg);
        }
        .drawer-item .drawer-name {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 65%;
        }
        .drawer-item .drawer-value {
            font-weight: 700;
            color: var(--accent);
            font-size: 13px;
            flex-shrink: 0;
        }
        .drawer-divider {
            height: 1px;
            background: #eef0f5;
            margin: 4px 0;
        }

        /* ===== 搜索和筛选 ===== */
        .toolbar {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
            align-items: center;
        }
        .search-box {
            flex: 1;
            min-width: 200px;
            padding: 10px 16px;
            border: 2px solid rgba(255,255,255,0.15);
            border-radius: 12px;
            font-size: 14px;
            background: rgba(255,255,255,0.08);
            color: white;
            transition: all 0.3s;
        }
        .search-box::placeholder { color: rgba(255,255,255,0.5); }
        .search-box:focus {
            outline: none;
            border-color: var(--accent);
            background: rgba(255,255,255,0.12);
            box-shadow: 0 0 0 3px rgba(102,126,234,0.15);
        }

        .category-tabs {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .tab-btn {
            padding: 8px 18px;
            border-radius: 999px;
            border: 2px solid rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.06);
            color: rgba(255,255,255,0.7);
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.3s;
        }
        .tab-btn:hover {
            background: rgba(102,126,234,0.2);
            border-color: rgba(102,126,234,0.4);
            color: white;
        }
        .tab-btn.active {
            background: var(--accent-gradient);
            border-color: transparent;
            color: white;
            box-shadow: 0 4px 15px rgba(102,126,234,0.3);
        }

        /* ===== 项目卡片网格 ===== */
        .project-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .project-card {
            background: var(--nav-bg);
            backdrop-filter: blur(12px);
            border-radius: 16px;
            padding: 24px;
            box-shadow: var(--shadow-sm);
            border: 1px solid rgba(102,126,234,0.1);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            opacity: 0;
            transform: translateY(16px);
            animation: cardIn 0.4s ease forwards;
        }
        .project-card:nth-child(2) { animation-delay: 0.08s; }
        .project-card:nth-child(3) { animation-delay: 0.16s; }
        .project-card:nth-child(4) { animation-delay: 0.24s; }
        @keyframes cardIn {
            to { opacity: 1; transform: translateY(0); }
        }
        .project-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.12);
        }
        .project-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #667eea, #764ba2);
        }

        .project-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 10px;
        }
        .project-name {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-primary);
            margin: 0;
        }
        .project-icon {
            font-size: 28px;
            flex-shrink: 0;
            margin-left: 8px;
        }

        .project-desc {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 14px;
            line-height: 1.6;
        }

        .project-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 14px;
        }
        .project-tag {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 11px;
            background: var(--badge-bg);
            color: var(--accent);
            font-weight: 500;
        }
        .project-tag.green { background: rgba(52,211,153,0.15); color: #059669; }
        .project-tag.orange { background: rgba(251,191,36,0.15); color: #d97706; }

        .project-path {
            font-size: 12px;
            color: var(--text-muted);
            font-family: 'Courier New', monospace;
            margin-bottom: 14px;
            padding: 6px 10px;
            background: rgba(0,0,0,0.03);
            border-radius: 6px;
        }

        /* ===== 文件列表 ===== */
        .file-section-label {
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 600;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .file-section-label::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #eef0f5;
        }

        .file-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 6px;
            margin-bottom: 12px;
        }
        .file-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            border-radius: 8px;
            background: #f8f9fc;
            text-decoration: none;
            color: var(--text-primary);
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s;
            border: 1px solid transparent;
        }
        .file-item:hover {
            background: var(--hover-bg);
            border-color: rgba(102,126,234,0.2);
            color: var(--accent);
            transform: translateX(3px);
        }
        .file-item .file-icon { font-size: 1em; flex-shrink: 0; }
        .file-item .file-name {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .file-item.main-file {
            background: linear-gradient(135deg, #667eea10, #764ba210);
            border: 1px solid rgba(102,126,234,0.2);
            font-weight: 700;
            color: var(--accent);
        }
        .file-item.main-file:hover {
            background: linear-gradient(135deg, #667eea20, #764ba220);
            border-color: var(--accent);
        }
        .file-item .badge {
            font-size: 10px;
            padding: 1px 7px;
            border-radius: 999px;
            background: rgba(102,126,234,0.15);
            color: var(--accent);
            font-weight: 600;
            margin-left: auto;
            flex-shrink: 0;
        }

        /* ===== 操作按钮组 ===== */
        .project-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            padding-top: 14px;
            border-top: 1px solid #eef0f5;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 7px 16px;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
        }
        .btn-primary {
            background: var(--accent-gradient);
            color: white;
            box-shadow: 0 3px 10px rgba(102,126,234,0.25);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102,126,234,0.35);
        }
        .btn-outline {
            background: transparent;
            border: 2px solid rgba(102,126,234,0.3);
            color: var(--accent);
        }
        .btn-outline:hover {
            background: var(--hover-bg);
            border-color: var(--accent);
        }
        .btn-sm { padding: 5px 12px; font-size: 12px; }

        /* ===== 空状态 ===== */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255,255,255,0.5);
            grid-column: 1 / -1;
        }
        .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
        .empty-state p { font-size: 15px; }

        /* ===== 响应式 ===== */
        @media (max-width: 768px) {
            .works-header { flex-direction: column; align-items: stretch; }
            .project-grid { grid-template-columns: 1fr; }
            .file-grid { grid-template-columns: 1fr 1fr; }
            .stats-row { grid-template-columns: repeat(2, 1fr); }
            .toolbar { flex-direction: column; }
            .search-box { min-width: 100%; }
            .category-tabs { justify-content: center; }
        }
        @media (max-width: 480px) {
            .file-grid { grid-template-columns: 1fr; }
            .stats-row { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>

    <script>
    // ===== 项目数据 =====
    const projects = [

            pages: 12,

            ]
        },
        {
            id: "htmlnotes",
            category: "notes",
            icon: "📝",
            title: "HTML 笔记",
            desc: "本地 Markdown 笔记工具（离线版），支持实时预览、保存、导出功能。使用 Tailwind CSS 和 marked.js 构建。",
            tags: ["笔记", "Markdown", "工具"],
            pages: 2,
            files: 24,
            sizeMB: 0.12,
            codeLines: 543,
            images: 3,
            videos: 0,
            lastUpdate: "2025-11-25",
            path: "HTML/HTML笔记",
            mainFile: { name: "笔记首页", file: "index.html", icon: "📝" },

        {

            tags: ["生活", "工具", "日历"],
            pages: 15,
            files: 57,

            codeLines: 13597,
            images: 0,
            videos: 0,
            lastUpdate: "2026-01-01",
            path: "HTML/my_live_in2026",
            mainFile: { name: "应用首页", file: "index.html", icon: "🏠" },
            items: [

                { name: "修复测试", file: "test_fix.html", icon: "✅" }

    // ===== 状态 =====
    let currentTab = "all";
    let searchQuery = "";

    // ===== 渲染统计卡片 =====
    function renderStats() {
        const totalPages = projects.reduce((sum, p) => sum + p.pages, 0);
        const totalFiles = projects.reduce((sum, p) => sum + p.files, 0);
        const totalProjects = projects.length;
        const totalSize = projects.reduce((sum, p) => sum + p.sizeMB, 0);
        const totalCodeLines = projects.reduce((sum, p) => sum + p.codeLines, 0);
        const totalImages = projects.reduce((sum, p) => sum + p.images, 0);
        const totalVideos = projects.reduce((sum, p) => sum + p.videos, 0);
        const totalMedia = totalImages + totalVideos;

        // 格式化大小
        function fmtSize(mb) {
            if (mb >= 1024) return (mb/1024).toFixed(1) + " GB";
            if (mb >= 1) return mb.toFixed(1) + " MB";
            return (mb*1024).toFixed(0) + " KB";
        }

        // 格式化代码行数
        function fmtLines(n) {
            if (n >= 1000) return (n/1000).toFixed(1) + "k";
            return n;
        }

        // 抽屉明细生成器
        function drawerDetail(items, valueFn) {
            return projects.map(p =>
                `<div class="drawer-item">
                    <span class="drawer-name">${p.icon} ${p.title}</span>
                    <span class="drawer-value">${valueFn(p)}</span>
                </div>`
            ).join('<div class="drawer-divider"></div>');
        }

        // 获取最新更新时间
        const allDates = projects.map(p => p.lastUpdate).sort().reverse();
        const newestDate = allDates[0] || "未知";

        const statsRow = document.getElementById("statsRow");
        statsRow.innerHTML = `
            <div class="stat-card">
                <div class="stat-icon">📂</div>
                <div class="stat-number">${totalProjects}</div>
                <div class="stat-label">项目总数</div>
            </div>
            <div class="stat-card stat-drawer">
                <div class="drawer-front">
                    <div class="stat-icon">📄</div>
                    <div class="stat-number">${totalPages}</div>
                    <div class="stat-label">页面总数 ▼</div>
                </div>
                <div class="drawer-body">${drawerDetail(projects, p => p.pages + " 页")}</div>
            </div>
            <div class="stat-card stat-drawer">
                <div class="drawer-front">
                    <div class="stat-icon">📁</div>
                    <div class="stat-number">${totalFiles}</div>
                    <div class="stat-label">文件总数 ▼</div>
                </div>
                <div class="drawer-body">${drawerDetail(projects, p => p.files + " 个")}</div>
            </div>
            <div class="stat-card stat-drawer">
                <div class="drawer-front">
                    <div class="stat-icon">🏷️</div>
                    <div class="stat-number">${projects.reduce((s, p) => s + p.tags.length, 0)}</div>
                    <div class="stat-label">标签总数 ▼</div>
                </div>
                <div class="drawer-body">${drawerDetail(projects, p => p.tags.join(" · "))}</div>
            </div>

            <div class="stat-card stat-drawer">
                <div class="drawer-front">
                    <div class="stat-icon">💾</div>
                    <div class="stat-number">${fmtSize(totalSize)}</div>
                    <div class="stat-label">总大小 ▼</div>
                </div>
                <div class="drawer-body">${drawerDetail(projects, p => fmtSize(p.sizeMB))}</div>
            </div>
            <div class="stat-card stat-drawer">
                <div class="drawer-front">
                    <div class="stat-icon">📊</div>
                    <div class="stat-number">${fmtLines(totalCodeLines)}</div>
                    <div class="stat-label">代码行数 ▼</div>
                </div>
                <div class="drawer-body">${drawerDetail(projects, p => fmtLines(p.codeLines) + " 行")}</div>
            </div>
            <div class="stat-card stat-drawer">
                <div class="drawer-front">
                    <div class="stat-icon">🎨</div>
                    <div class="stat-number">${totalMedia}</div>
                    <div class="stat-label">照片/视频 ▼</div>
                </div>
                <div class="drawer-body">${drawerDetail(projects, p => {
                    let parts = [];
                    if (p.images > 0) parts.push(p.images + " 张照片");
                    if (p.videos > 0) parts.push(p.videos + " 个视频");
                    return parts.length > 0 ? parts.join(" · ") : "暂无";
                })}</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">⏱️</div>
                <div class="stat-number" style="font-size:18px;">${newestDate}</div>
                <div class="stat-label">最近更新</div>
            </div>
        `;
    }

    // ===== 渲染项目卡片 =====
    function renderProjects() {
        const grid = document.getElementById("projectGrid");

        const filtered = projects.filter(p => {
            // 分类筛选
            if (currentTab !== "all" && p.category !== currentTab) return false;
            // 搜索筛选
            if (searchQuery) {
                const q = searchQuery.toLowerCase();
                const matchTitle = p.title.toLowerCase().includes(q);
                const matchDesc = p.desc.toLowerCase().includes(q);
                const matchTags = p.tags.some(t => t.toLowerCase().includes(q));
                const matchFiles = p.items.some(f => f.name.toLowerCase().includes(q));
                return matchTitle || matchDesc || matchTags || matchFiles;
            }
            return true;
        });

        if (filtered.length === 0) {
            grid.innerHTML = `
                <div class="empty-state">
                    <div class="icon">🔍</div>
                    <p>${searchQuery ? '没有找到匹配的项目' : '该分类暂无项目'}</p>
                </div>
            `;
            return;
        }

        grid.innerHTML = filtered.map(project => {
            const homeUrl = project.path + "/" + project.mainFile.file;
            const filesHtml = project.items.map(f => `
                <a href="${project.path}/${f.file}" class="file-item" title="${f.file}">
                    <span class="file-icon">${f.icon}</span>
                    <span class="file-name">${f.name}</span>
                </a>
            `).join("");

            const tagsHtml = project.tags.map(t => {
                const colorClass = ["非遗","3D"].includes(t) ? "green" : ["生活"].includes(t) ? "orange" : "";
                return `<span class="project-tag ${colorClass}">#${t}</span>`;
            }).join("");

            return `
                <div class="project-card">
                    <div class="project-card-header">
                        <h3 class="project-name">${project.title}</h3>
                        <span class="project-icon">${project.icon}</span>
                    </div>
                    <div class="project-desc">${project.desc}</div>
                    <div class="project-meta">${tagsHtml}</div>
                    <div class="project-path">📂 ${project.path}/</div>

                    <div class="file-section-label">📄 页面入口</div>
                    <div class="file-grid">
                        <a href="${homeUrl}" class="file-item main-file" title="${project.mainFile.file}">
                            <span class="file-icon">${project.mainFile.icon}</span>
                            <span class="file-name">${project.mainFile.name}</span>
                            <span class="badge">首页</span>
                        </a>
                        ${filesHtml}
                    </div>

                    <div class="project-actions">
                        <a href="${homeUrl}" class="btn btn-primary btn-sm" target="_blank">🚀 打开首页</a>
                        <a href="${project.path}/" class="btn btn-outline btn-sm">📂 浏览目录</a>
                    </div>
                </div>
            `;
        }).join("");
    }

    // ===== 切换分类 =====
    function switchTab(btn, tab) {
        document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        currentTab = tab;
        renderProjects();
    }

    // ===== 搜索 =====
    function filterProjects() {
        searchQuery = document.getElementById("searchBox").value;
        renderProjects();
    }

    // ===== 初始化 =====
    renderStats();
    renderProjects();

    // ===== 回到顶部按钮 =====
    window.addEventListener("scroll", () => {
        const btn = document.querySelector(".back-to-top");
        if (window.scrollY > 300) {
            btn.classList.add("visible");
        } else {
            btn.classList.remove("visible");
        }
    });

    // ===== 移动端菜单 =====
    function toggleMenu() {
        const nav = document.querySelector("nav");
        const hamburger = document.querySelector(".hamburger");
        nav.classList.toggle("active");
        hamburger.classList.toggle("active");
    }
    </script>
</body>
</html>
