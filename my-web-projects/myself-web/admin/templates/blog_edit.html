{% extends "base.html" %}
{% block content %}
<h2 class="page-title">✏️ 编辑博客</h2>

<div class="card">
    <h3>{{ blog.title }}</h3>
    <form method="POST">
        <div class="form-group">
            <label>标题</label>
            <input type="text" name="title" value="{{ blog.title }}" required>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>日期</label>
                <input type="date" name="date" value="{{ blog.date }}">
            </div>
            <div class="form-group">
                <label>Slug（URL 标识）</label>
                <input type="text" name="slug" value="{{ blog.slug }}">
                <div class="help-text">如 "vue3-vite-personal-site"</div>
            </div>
        </div>
        <div class="form-group">
            <label>简介</label>
            <textarea name="summary" rows="2">{{ blog.summary }}</textarea>
        </div>
        <div class="form-group">
            <label>标签（逗号分隔）</label>
            <input type="text" name="tags" value="{{ blog.tags|join(', ') }}">
        </div>
        <div class="form-group">
            <label>内容（Markdown）</label>
            <textarea name="content" rows="12" required>{{ blog.content }}</textarea>
        </div>
        <div class="btn-group">
            <button type="submit" class="btn btn-primary">💾 保存修改</button>
            <a href="/admin/blogs" class="btn btn-outline">取消</a>
        </div>
    </form>
</div>
{% endblock %}
