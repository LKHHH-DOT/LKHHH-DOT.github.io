{% extends "base.html" %}
{% block content %}
<h2 class="page-title">✏️ 编辑状态</h2>

<div class="card">
    <h3>{{ status_item.title }}</h3>
    <form method="POST">
        <div class="form-group">
            <label>标题</label>
            <input type="text" name="title" value="{{ status_item.title }}" required>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>图标（Emoji）</label>
                <input type="text" name="icon" value="{{ status_item.icon }}" maxlength="10">
                <div class="help-text">输入 Emoji 图标，如 🚀 🎉 🔧 💻</div>
            </div>
            <div class="form-group">
                <label>日期</label>
                <input type="date" name="date" value="{{ status_item.date }}">
            </div>
        </div>
        <div class="form-group">
            <label>详情</label>
            <textarea name="detail" rows="4">{{ status_item.detail }}</textarea>
        </div>
        <div class="btn-group">
            <button type="submit" class="btn btn-primary">💾 保存修改</button>
            <a href="/admin/status" class="btn btn-outline">取消</a>
        </div>
    </form>
</div>
{% endblock %}
