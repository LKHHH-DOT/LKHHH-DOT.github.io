{% extends "base.html" %}
{% block content %}
<h2 class="page-title">✏️ 编辑项目</h2>

<div class="card">
    <h3>{{ project.title }}</h3>
    <form method="POST">
        <div class="form-group">
            <label>项目名称</label>
            <input type="text" name="title" value="{{ project.title }}" required>
        </div>
        <div class="form-group">
            <label>描述</label>
            <textarea name="description" rows="3">{{ project.description }}</textarea>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>技术栈（逗号分隔）</label>
                <input type="text" name="tech" value="{{ project.tech|join(', ') }}">
            </div>
            <div class="form-group">
                <label>状态</label>
                <select name="status">
                    <option value="进行中" {% if project.status == '进行中' %}selected{% endif %}>🔄 进行中</option>
                    <option value="已完成" {% if project.status == '已完成' %}selected{% endif %}>✅ 已完成</option>
                    <option value="计划中" {% if project.status == '计划中' %}selected{% endif %}>📋 计划中</option>
                    <option value="暂停" {% if project.status == '暂停' %}selected{% endif %}>⏸️ 暂停</option>
                </select>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>项目链接</label>
                <input type="text" name="link" value="{{ project.link }}">
            </div>
            <div class="form-group">
                <label>GitHub 链接</label>
                <input type="text" name="github" value="{{ project.github }}">
            </div>
        </div>
        <div class="form-group">
            <label>图片 URL</label>
            <input type="text" name="image" value="{{ project.image }}">
        </div>
        <div class="btn-group">
            <button type="submit" class="btn btn-primary">💾 保存修改</button>
            <a href="/admin/projects" class="btn btn-outline">取消</a>
        </div>
    </form>
</div>
{% endblock %}
