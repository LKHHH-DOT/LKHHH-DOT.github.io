<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
  </defs>
  <!-- 圆角背景 -->
  <rect width="100" height="100" rx="20" fill="url(#bg)"/>
  <!-- 三个点：左、中、右 -->
  <circle cx="35" cy="40" r="7" fill="white"/>
  <circle cx="50" cy="60" r="7" fill="white"/>
  <circle cx="65" cy="40" r="7" fill="white"/>
  <!-- 连接线：左→中→右 -->
  <line x1="35" y1="40" x2="50" y2="60" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="50" y1="60" x2="65" y2="40" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
</svg>